# Branch Protection Rule 配置
# 在仓库设置中手动配置，或使用 GitHub CLI 设置

# 方法 1: 手动配置
# 1. 打开 https://github.com/lihaizhong/communism/settings/branches
# 2. 添加规则 (Add rule)
# 3. Branch rule pattern: main
# 4. 勾选:
#    - Require pull request reviews (推荐 1 人 review)
#    - Require status checks to pass before merging
#    - Require workflows to pass before merging
#    - Include administrators ✓
# 5. 保存

# 方法 2: 使用 GitHub CLI (需要 admin 权限)
# gh api repos/lihaizhong/communism/branches/main/protection -X PUT \
#   -f 'require_reviews={"required_reviewers":[],"dismiss_stale_reviews":false,"require_last_push_author":false}' \
#   -f 'allow_force_pushes'=false \
#   -f 'allow_deletions'=false

# 推荐配置:
# - main 分支保护 ✓
# - 需要 PR 合并 (至少 1 人 review)
# - 需要 CI 通过 (npm run build & test 通过)
# - 允许 workflow 触发发布 (changeset publish 自动执行)