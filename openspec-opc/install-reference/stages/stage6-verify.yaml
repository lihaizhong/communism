version: "1.0"
schema_version: "2.0"
stage: "stage6"
name: "完成验证"
description: "校验最终安装结果，并向用户展示完成摘要与未完成项。"
task_file: "harness-install-tasks.md"
inputs:
  - AI_TOOL_NAME
  - AI_CONFIG_DIR
  - CI_TYPE
  - CI_CONFIG_PATH
  - GENERATE_PRE_COMMIT
  - TEST_STATUS
  - TEST_BLOCKER_REASON
  - INSTALL_LANE_ID
  - INSTALL_LANE_PROFILE
  - EXECUTION_PATH
  - CONFORMANCE_REPORT_PATH
  - CONFORMANCE_JSON_PATH
outputs:
  - INSTALL_RESULT
fallback:
  on_verification_failure: "回写失败项、占位残留与空壳文件信息，并提示用户修复后重试"
variable_conventions:
  case: "UPPER_SNAKE_CASE for task variables"
  write_scope: "Verification and summary only"
contracts:
  canonical_result: "openspec-opc/install-reference/conformance-contract.mjs"
  render_contract: "openspec-opc/install-reference/render-contract.mjs"

steps:
  - id: final_check
    name: "最终验证清单与防伪完成检查"
    checks:
      - file_exists: "openspec/config.yaml"
        desc: "配置文件存在且格式正确"
      - dir_has_content: "openspec/schemas/"
        desc: "包含 spec-driven、bugfix、spike"
      - file_exists: "AGENTS.md"
        desc: "AI 行为指南存在"
      - files_count: "{{AI_CONFIG_DIR}}/commands/*.md == 6"
        desc: "6 个命令文件"
      - dirs_count: "{{AI_CONFIG_DIR}}/skills/"
        desc: "6 个技能目录"
      - not_exists: "{{AI_CONFIG_DIR}}/../command/"
        desc: "不存在旧的单数目录"
      - if: "AI_TOOL_NAME == opencode"
        file_exists: ".opencode/opencode.json"
        desc: "OpenCode 配置文件存在"
      - file_exists: "{{CI_CONFIG_PATH}}"
        desc: "CI/CD 配置存在（不可跳过）"
      - if: "TEST_STATUS == pending"
        action: "在完成摘要中展示测试框架待处理"
        desc: "测试框架暂未安装，但已记录后续动作"
      - if: "GENERATE_PRE_COMMIT == yes"
        one_of:
          - file_executable: ".git/hooks/pre-commit"
          - file_executable: ".husky/pre-commit"
        desc: "pre-commit hook 已安装且可执行（支持 .git/hooks 或 .husky）"
    verify:
      command: |
        ! rg -n -i 'TODO|TBD|placeholder|stub|mock|待补充|未实现' \
          openspec/config.yaml \
          AGENTS.md \
          {{AI_CONFIG_DIR}}/commands \
          {{AI_CONFIG_DIR}}/skills && \
        test -s openspec/config.yaml && \
        test -s AGENTS.md && \
        test -s "{{CI_CONFIG_PATH}}" && \
        ! grep -E '\\{\\{[A-Z_]+\\}\\}' "{{CI_CONFIG_PATH}}" && \
        { [ "{{GENERATE_PRE_COMMIT}}" != "yes" ] || { \
          { [ ! -f .git/hooks/pre-commit ] || { test -s .git/hooks/pre-commit && ! grep -E '\\{\\{[A-Z_]+\\}\\}' .git/hooks/pre-commit; }; } && \
          { [ ! -f .husky/pre-commit ] || { test -s .husky/pre-commit && ! grep -E '\\{\\{[A-Z_]+\\}\\}' .husky/pre-commit; }; }; \
        }; } && \
        [ "$(find {{AI_CONFIG_DIR}}/commands -type f -name '*.md' | wc -l | tr -d ' ')" = "6" ] && \
        [ "$(find {{AI_CONFIG_DIR}}/commands -type f -name '*.md' -size +0c | wc -l | tr -d ' ')" = "6" ] && \
        [ "$(find {{AI_CONFIG_DIR}}/skills -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')" = "6" ] && \
        [ "$(find {{AI_CONFIG_DIR}}/skills -mindepth 1 -maxdepth 1 -type d -exec test -s '{}/SKILL.md' ';' -print | wc -l | tr -d ' ')" = "6" ] && \
        { [ "{{AI_TOOL_NAME}}" != "opencode" ] || { \
          test -s .opencode/opencode.json && \
          rg -q '"\\$schema"\\s*:\\s*"https://opencode.ai/config.json"' .opencode/opencode.json && \
          rg -q '"plugin"\\s*:' .opencode/opencode.json && \
          rg -q '@openspec-opc/opencode-plugin' .opencode/opencode.json; \
        }; }
      expected: "退出码为 0，且不存在 TODO/占位/空文件/缺失 SKILL.md 的伪完成情况；若目标是 OpenCode，则 .opencode/opencode.json 至少包含官方 schema、plugin 字段和 @openspec-opc/opencode-plugin"

  - id: show_summary
    name: "通过 render contract 显示 canonical result card"
    template: |
      OpenSpec OPC install result
      overall result: {{INSTALL_RESULT}}
      execution path: {{EXECUTION_PATH}} ({{INSTALL_LANE_ID}}/{{INSTALL_LANE_PROFILE}})
      gate results:
      ├─ lint: passed|failed|missing|not_run
      ├─ test: passed|failed|missing|not_run
      ├─ typecheck: passed|failed|missing|not_run
      written changes:
      ├─ openspec/config.yaml
      ├─ openspec/schemas/
      ├─ AGENTS.md
      ├─ {{AI_CONFIG_DIR}}/commands/
      ├─ {{AI_CONFIG_DIR}}/skills/
      {{- if AI_TOOL_NAME == opencode }}
      ├─ .opencode/opencode.json
      ├─ openspec/.openspec-opc-state.json
      {{- endif }}
      ├─ {{CI_CONFIG_PATH}}
      {{- if TEST_STATUS == pending }}
      ├─ pending: 测试框架未完成 ({{TEST_BLOCKER_REASON}})
      {{- endif }}
      {{- if GENERATE_PRE_COMMIT == yes }}
      ├─ pre-commit hook
      {{- endif }}
      next actions:
      1. 查看 openspec/config.yaml 确认配置
      2. 阅读 AGENTS.md 了解 AI 助手的工作方式
      3. 运行默认首条路径：/opsx-propose my-first-feature
      artifact paths:
      - human report: {{CONFORMANCE_REPORT_PATH}}
      - machine json: {{CONFORMANCE_JSON_PATH}}
      note: gate status lines must come from canonical_result.gates via render_contract, not from raw command variables

on_complete:
  action: "仅在最终验证通过时标记 harness-install-tasks.md 任务完成并保留 pending 项说明；若发现伪完成痕迹，则将 INSTALL_RESULT 记录为 failed，并回写具体失败文件与原因"
