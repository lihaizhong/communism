version: "1.0"
schema_version: "2.0"
stage: "stage5"
name: "执行安装任务"
description: "根据任务账本执行实际写入、依赖安装、文件生成和验证。"
task_file: "harness-install-tasks.md"
inputs:
  - PROJECT_NAME
  - LANGUAGE
  - AI_TOOL_NAME
  - AI_CONFIG_DIR
  - CONFIG_CONFLICT
  - CONFIG_CONFLICT_STRATEGY
  - TEST_STATUS
  - TEST_INSTALL_CMD
  - LINT_COMMAND
  - TEST_COMMAND
  - TYPE_CHECK_COMMAND
  - INSTALL_LANE_ID
  - INSTALL_LANE_PROFILE
outputs:
  - CI_TYPE
  - CI_CONFIG_PATH
  - GENERATE_PRE_COMMIT
  - EXECUTION_PATH
  - PROFILE_SMOKE_STATUS
  - PROFILE_SMOKE_COMMAND
  - PROFILE_SMOKE_SUMMARY
  - TERMINAL_RESULT_CARD_PATH
  - CONFORMANCE_REPORT_PATH
  - CONFORMANCE_JSON_PATH
  - INSTALL_RESULT
fallback:
  on_missing_required_vars: "回到对应阶段补充，不得继续执行"
  on_conflict_without_strategy: "停止并请求用户确认策略"
  on_failed_task: "标记任务失败并停止后续高风险写入"
variable_conventions:
  case: "UPPER_SNAKE_CASE for task variables"
  write_scope: "May modify project files and install dependencies"
contracts:
  lane_runtime: "openspec-opc/install-reference/lane-registry.mjs"
  profile_smoke_contract: "openspec-opc/install-reference/profile-smoke-contract.mjs"
  canonical_result: "openspec-opc/install-reference/conformance-contract.mjs"
  render_contract: "openspec-opc/install-reference/render-contract.mjs"
  stop_point_contract: "openspec-opc/install-reference/stop-points.mjs"

pre_check:
  - name: "读取 harness-install-tasks.md"
    action: "解析配置变量表和任务列表"
  - name: "验证变量完整性"
    required_vars:
      - PROJECT_NAME
      - PROJECT_DESCRIPTION
      - PROJECT_TYPE
      - LANGUAGE
      - PRIMARY_FRAMEWORK
      - INSTALL_LANE_ID
      - INSTALL_LANE_PROFILE
      - SRC_DIR
      - TEST_DIR
      - AI_TOOL_NAME
      - AI_CONFIG_DIR
    on_missing:
      action: "回到对应阶段补充信息"
  - name: "验证冲突处理策略"
    rules:
      - if: "CONFIG_CONFLICT == yes 且 CONFIG_CONFLICT_STRATEGY 为空"
        action: "停止执行并要求用户选择 backup_overwrite / merge / coexist"
  - name: "激活条件任务"
    rules:
      - if: "INTEGRATE_AI_DOCS == yes"
        action: "将 T7 从 [-] 改为 [ ]"
      - if: "INSTALL_LANE_ID == node-ts"
        action: "设置 EXECUTION_PATH = new_lane、TERMINAL_RESULT_CARD_PATH = openspec/install-result.txt、CONFORMANCE_REPORT_PATH = openspec/install-report.md、CONFORMANCE_JSON_PATH = openspec/install-report.json；后续 gate 顺序固定为 lint -> test -> typecheck。若 INSTALL_LANE_PROFILE == app/service，则还必须通过 profile_smoke_contract 解析并记录 PROFILE_SMOKE_STATUS、PROFILE_SMOKE_COMMAND、PROFILE_SMOKE_SUMMARY；若 INSTALL_LANE_PROFILE == library，则必须显式记录 PROFILE_SMOKE_STATUS = not_applicable"
      - if: "INSTALL_LANE_ID != node-ts"
        action: "设置 EXECUTION_PATH = legacy_fallback、TERMINAL_RESULT_CARD_PATH = openspec/install-result.txt，并清空 PROFILE_SMOKE_COMMAND/PROFILE_SMOKE_SUMMARY；legacy fallback 仍必须输出主结果卡，但不要求生成 new lane 的 report/json artifact"

core_tasks:
  - id: T0
    name: "初始化 Git 仓库"
    condition: "GIT_INITIALIZED == no"
    command: "git init"
    on_complete: "标记 T0 [x]"

  - id: T0.5
    name: "确认是否生成 pre-commit hook"
    prompt: |
      🤖 是否安装 pre-commit hook？

      可选模板来源：`.template/ci-templates/hooks/pre-commit`

      作用：
      ├─ 在每次 `git commit` 前运行 lint / 测试
      ├─ 失败时阻止提交
      └─ 安装位置根据项目实际情况选择 `.git/hooks/pre-commit` 或 `.husky/pre-commit`

      请选择（yes/no）：
    options:
      - id: yes
        label: "yes - 生成 pre-commit hook"
        action: "记录 GENERATE_PRE_COMMIT = yes 到 harness-install-tasks.md"
      - id: no
        label: "no - 跳过 pre-commit hook"
        action: "记录 GENERATE_PRE_COMMIT = no 到 harness-install-tasks.md"
    on_complete: "记录 GENERATE_PRE_COMMIT 供后续条件任务与验证阶段使用；若 GENERATE_PRE_COMMIT == yes，则将 T8 从 [-] 改为 [ ]"

  - id: T1
    name: "执行 openspec init"
    command: "openspec init"
    on_complete: "标记 T1 [x]"

  - id: T2
    name: "复制 Harness 模板文件"
    stop_point: true
    stop_prompt: |
      ⚠️ 文件变更确认

      即将执行以下写入操作：
      ├─ openspec/config.yaml
      ├─ openspec/schemas/
      ├─ AGENTS.md
      ├─ {{AI_CONFIG_DIR}}/
      └─ .opencode/opencode.json（仅 OpenCode，用于注册 @openspec-opc/opencode-plugin）

      若目标已存在，必须先展示冲突处理策略：
      ├─ backup_overwrite 备份后覆盖
      ├─ merge            尝试合并
      └─ coexist          并存安装到新目录
    options:
      - id: confirm
        label: "确认继续"
      - id: backup
        label: "备份后继续"
        action: "创建 .backup/ 备份，并设置 CONFIG_CONFLICT_STRATEGY = backup_overwrite"
      - id: merge
        label: "合并后继续"
        action: "设置 CONFIG_CONFLICT_STRATEGY = merge"
      - id: coexist
        label: "并存安装"
        action: "设置 CONFIG_CONFLICT_STRATEGY = coexist"
      - id: cancel
        label: "取消"
        action: "终止流程"
    files:
      - src: ".template/openspec/config.yaml"
        dest: "openspec/config.yaml"
      - src: ".template/openspec/schemas/*"
        dest: "openspec/schemas/"
      - src: ".template/AGENTS.md"
        dest: "AGENTS.md"
      - src: ".template/agent-config/"
        dest: "{{AI_CONFIG_DIR}}/"
        rename: true
    on_complete: "标记 T2 [x]"

  - id: T3
    name: "安装测试框架"
    condition: "TEST_INSTALL_CMD 不为空且不是内置框架且 TEST_INSTALL_CMD != 'pending'"
    builtin_frameworks: ["go test", "cargo test", "内置"]
    command: "{{TEST_INSTALL_CMD}}"
    on_complete: "标记 T3 [x]"

  - id: T4
    name: "清理旧版兼容性目录"
    command: |
      if [ -d "{{AI_CONFIG_DIR}}/../command" ]; then
        rm -rf "{{AI_CONFIG_DIR}}/../command"
      fi
    on_complete: "标记 T4 [x]"

  - id: T5
    name: "填充技术栈变量"
    action: "读取 harness-install-tasks.md 配置变量表，替换所有已生成模板文件中的 {{变量名}}，至少包括 openspec/config.yaml、AGENTS.md、CI 模板文件和 pre-commit hook（如已生成）"
    target_files:
      - "openspec/config.yaml"
      - "AGENTS.md"
      - "{{CI_CONFIG_PATH}}"
      - ".git/hooks/pre-commit"
      - ".husky/pre-commit"
    verify:
      command: |
        ! grep -E '\\{\\{[A-Z_]+\\}\\}' openspec/config.yaml AGENTS.md && \
        { [ -z "{{CI_CONFIG_PATH}}" ] || ! grep -E '\\{\\{[A-Z_]+\\}\\}' "{{CI_CONFIG_PATH}}"; } && \
        { [ "{{GENERATE_PRE_COMMIT}}" != "yes" ] || { \
          { [ ! -f .git/hooks/pre-commit ] || ! grep -E '\\{\\{[A-Z_]+\\}\\}' .git/hooks/pre-commit; } && \
          { [ ! -f .husky/pre-commit ] || ! grep -E '\\{\\{[A-Z_]+\\}\\}' .husky/pre-commit; }; \
        }; }
      expected: "已生成的模板文件中不存在未替换的 {{变量名}}"
    on_complete: "标记 T5 [x]"

  - id: T5.5
    name: "写出安装结果产物"
    action: "若 EXECUTION_PATH == new_lane，则基于真实 gate 结果构造 canonical result，并写入 {{TERMINAL_RESULT_CARD_PATH}}、{{CONFORMANCE_REPORT_PATH}}、{{CONFORMANCE_JSON_PATH}}；若 INSTALL_LANE_PROFILE == app/service，则 canonical result 必须同时写入 profileSmoke.command = {{PROFILE_SMOKE_COMMAND}}、profileSmoke.status = {{PROFILE_SMOKE_STATUS}}、profileSmoke.summary = {{PROFILE_SMOKE_SUMMARY}}；若 INSTALL_LANE_PROFILE == library，则 canonical result 必须显式写入 profileSmoke.status = not_applicable。若 EXECUTION_PATH == legacy_fallback，则仍必须写出 {{TERMINAL_RESULT_CARD_PATH}} 作为主输出，并明确显示 legacy_fallback，而不是伪造 new lane report/json"
    verify:
      command: |
        test -s "{{TERMINAL_RESULT_CARD_PATH}}" && \
        ! grep -E '\\{\\{[A-Z_]+\\}\\}' "{{TERMINAL_RESULT_CARD_PATH}}" && \
        { [ "{{EXECUTION_PATH}}" != "new_lane" ] || { \
          test -s "{{CONFORMANCE_REPORT_PATH}}" && \
          test -s "{{CONFORMANCE_JSON_PATH}}" && \
          ! grep -E '\\{\\{[A-Z_]+\\}\\}' "{{CONFORMANCE_REPORT_PATH}}" "{{CONFORMANCE_JSON_PATH}}" && \
          rg -q 'profile smoke:' "{{TERMINAL_RESULT_CARD_PATH}}" && \
          rg -q '## Profile Smoke' "{{CONFORMANCE_REPORT_PATH}}" && \
          rg -q '"profileSmoke"' "{{CONFORMANCE_JSON_PATH}}"; \
        }; }
      expected: "主结果卡必须总是先写出；若命中 new lane，则 human report、machine JSON 与 profile smoke 字段也必须在进入 T6 前已经生成"
    on_complete: "标记 T5.5 [x]"

  - id: T6
    name: "运行 conformance 校验并验证安装清单"
    checks:
      - file_exists: "openspec/config.yaml"
      - dir_has_content: "openspec/schemas/"
      - file_exists: "AGENTS.md"
      - files_count: "{{AI_CONFIG_DIR}}/commands/*.md == 6"
      - dirs_count: "{{AI_CONFIG_DIR}}/skills/ == 6"
      - not_exists: "{{AI_CONFIG_DIR}}/../command/"
      - if: "AI_TOOL_NAME == opencode"
        file_exists: ".opencode/opencode.json"
      - if: "TEST_STATUS == pending"
        action: "记录测试框架尚未完成，不阻塞安装完成"
      - file_exists: "{{TERMINAL_RESULT_CARD_PATH}}"
        desc: "主结果卡已生成"
      - if: "INSTALL_LANE_ID == node-ts"
        file_exists: "{{CONFORMANCE_REPORT_PATH}}"
        desc: "human-readable conformance report 已生成"
      - if: "INSTALL_LANE_ID == node-ts"
        file_exists: "{{CONFORMANCE_JSON_PATH}}"
        desc: "machine JSON conformance bundle 已生成"
      - if: "INSTALL_LANE_ID == node-ts"
        action: "必须验证真实 gate 结果、new lane artifact 与 profile smoke 记录；仅命令存在不算 success"
    verify:
      command: |
        ! rg -n -i 'TODO|TBD|placeholder|stub|mock|待补充|未实现' \
          openspec/config.yaml \
          AGENTS.md \
          {{AI_CONFIG_DIR}}/commands \
          {{AI_CONFIG_DIR}}/skills && \
        test -s openspec/config.yaml && \
        test -s AGENTS.md && \
        { [ -z "{{CI_CONFIG_PATH}}" ] || { test -s "{{CI_CONFIG_PATH}}" && ! grep -E '\\{\\{[A-Z_]+\\}\\}' "{{CI_CONFIG_PATH}}"; }; } && \
        { [ "{{GENERATE_PRE_COMMIT}}" != "yes" ] || { \
          { [ ! -f .git/hooks/pre-commit ] || { test -s .git/hooks/pre-commit && ! grep -E '\\{\\{[A-Z_]+\\}\\}' .git/hooks/pre-commit; }; } && \
          { [ ! -f .husky/pre-commit ] || { test -s .husky/pre-commit && ! grep -E '\\{\\{[A-Z_]+\\}\\}' .husky/pre-commit; }; }; \
        }; } && \
        test -s "{{TERMINAL_RESULT_CARD_PATH}}" && \
        ! grep -E '\\{\\{[A-Z_]+\\}\\}' "{{TERMINAL_RESULT_CARD_PATH}}" && \
        [ "$(find {{AI_CONFIG_DIR}}/commands -type f -name '*.md' | wc -l | tr -d ' ')" = "6" ] && \
        [ "$(find {{AI_CONFIG_DIR}}/commands -type f -name '*.md' -size +0c | wc -l | tr -d ' ')" = "6" ] && \
        [ "$(find {{AI_CONFIG_DIR}}/skills -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')" = "6" ] && \
        [ "$(find {{AI_CONFIG_DIR}}/skills -mindepth 1 -maxdepth 1 -type d -exec test -s '{}/SKILL.md' ';' -print | wc -l | tr -d ' ')" = "6" ] && \
        { [ "{{AI_TOOL_NAME}}" != "opencode" ] || { \
          test -s .opencode/opencode.json && \
          rg -q '"\\$schema"\\s*:\\s*"https://opencode.ai/config.json"' .opencode/opencode.json && \
          rg -q '"plugin"\\s*:' .opencode/opencode.json && \
          rg -q '@openspec-opc/opencode-plugin' .opencode/opencode.json; \
        }; } && \
        { [ "{{INSTALL_LANE_ID}}" != "node-ts" ] || { \
          test -n "{{LINT_COMMAND}}" && test -n "{{TEST_COMMAND}}" && test -n "{{TYPE_CHECK_COMMAND}}" && \
          ! printf '%s\n%s\n%s\n' "{{LINT_COMMAND}}" "{{TEST_COMMAND}}" "{{TYPE_CHECK_COMMAND}}" | rg -n -i 'error:\\s*no test specified|TODO|TBD|placeholder|stub|mock|待补充|未实现' && \
          test -n "{{PROFILE_SMOKE_STATUS}}" && \
          { [ "{{INSTALL_LANE_PROFILE}}" = "library" ] || test -n "{{PROFILE_SMOKE_COMMAND}}"; } && \
          test -s "{{TERMINAL_RESULT_CARD_PATH}}" && \
          test -s "{{CONFORMANCE_REPORT_PATH}}" && \
          test -s "{{CONFORMANCE_JSON_PATH}}" && \
          ! grep -E '\\{\\{[A-Z_]+\\}\\}' "{{TERMINAL_RESULT_CARD_PATH}}" "{{CONFORMANCE_REPORT_PATH}}" "{{CONFORMANCE_JSON_PATH}}" && \
          rg -q 'profile smoke:' "{{TERMINAL_RESULT_CARD_PATH}}" && \
          rg -q '## Profile Smoke' "{{CONFORMANCE_REPORT_PATH}}" && \
          rg -q '"profileSmoke"' "{{CONFORMANCE_JSON_PATH}}"; \
        }; }
      expected: "退出码为 0，且不存在 TODO/占位/空壳命令或缺失 SKILL.md 的技能目录；若目标是 OpenCode，则 .opencode/opencode.json 至少包含官方 schema、plugin 字段和 @openspec-opc/opencode-plugin；若命中 Node/TS lane，则 lint/test/typecheck 都必须具备真实 conformance 命令，且 terminal result card、human report、machine JSON 三类结果产物都已实际写出，并记录 profile smoke 字段"
    on_complete: "标记 T6 [x]"

conditional_tasks:
  - id: T2.5
    name: "配置 OpenCode 运行时守卫插件"
    condition: "AI_TOOL_NAME == opencode"
    action: "创建或合并 .opencode/opencode.json，目标结构至少应为 { \"$schema\": \"https://opencode.ai/config.json\", \"plugin\": [\"@openspec-opc/opencode-plugin\"] }；字段合法性以 https://opencode.ai/config.json 为准。保留其他现有合法配置，但不要写成 plugins，也不要再复制 vendored runtime 或本地 bridge loader 文件。"
    on_complete: "标记 T2.5 [x]"

  - id: T7
    name: "整合非技术类信息到 AGENTS.md"
    condition: "INTEGRATE_AI_DOCS == yes"
    action: "合并暂存的编码规范、AI 角色等到 AGENTS.md"
    on_complete: "标记 T7 [x]"

  - id: T8
    name: "生成 pre-commit hook"
    condition: "GENERATE_PRE_COMMIT == yes"
    action: "根据项目实际情况，将 .template/ci-templates/hooks/pre-commit 生成到 .git/hooks/pre-commit 或 .husky/pre-commit"
    on_complete: "标记 T8 [x]"

ci_config:
  name: "生成 CI/CD 配置（必须执行，不可跳过）"
  prompt: |
    🤖 请选择 CI/CD 平台：

    【选项 1】GitHub Actions
       创建 .github/workflows/openspec-archive.yml

    【选项 2】GitLab CI
       创建 .gitlab-ci.yml

    【选项 3】其他平台
       提供通用配置模板作为参考

    请选择（1/2/3）：
  options:
    - id: github
      label: "1 - GitHub Actions"
      output: ".github/workflows/openspec-archive.yml"
    - id: gitlab
      label: "2 - GitLab CI"
      output: ".gitlab-ci.yml"
    - id: other
      label: "3 - 其他平台"
      output: "HARNESS_CI.md"
  on_select:
    action: "根据选择生成 CI/CD 配置，并记录 CI_TYPE 和 CI_CONFIG_PATH 到 harness-install-tasks.md"
  on_complete: "记录 CI_TYPE 和 CI_CONFIG_PATH 到 harness-install-tasks.md"

on_complete:
  verify: "harness-install-tasks.md 中核心任务全部 [x]，且 canonical result 状态可被 render contract 直接消费"
  action: "仅当新 lane gate 与 artifact 都通过时记录 INSTALL_RESULT = success；若写入后失败则记录 partial_install；若退回旧路径则记录 legacy_fallback；若发现占位内容、空文件或缺失关键文件，则记录 INSTALL_RESULT = failed，并将对应任务标记为 [!]"
  next: "stage6"
