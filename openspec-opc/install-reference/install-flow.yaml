# OpenSpec Harness 安装流程定义
# 版本: 1.0.0
# 用途: 供 AI 程序化解析执行流程

version: "1.0"

metadata:
  name: "OpenSpec Harness Installation"
  description: "Harness 环境安装流程"
  min_openspec_version: "0.1.0"
  min_node_version: "18.0.0"

# 流程定义
flow:
  # 前置检查
  - id: prerequisite
    name: "前置要求检查"
    type: required
    steps:
      - id: check_cli
        name: "检查 OpenSpec CLI"
        command: "openspec --version"
        on_fail:
          action: prompt_install
          options:
            - id: auto_install
              label: "自动安装"
              command: "npm install -g @fission-ai/openspec@latest"
              verify: "openspec --version"
            - id: manual_install
              label: "手动安装"
              action: "终止流程，引导用户访问官方文档"
      - id: check_project_dir
        name: "检查项目目录"
        checks:
          - file_exists: "package.json"
          - file_exists: "go.mod"
          - file_exists: "Cargo.toml"
          - file_exists: "pyproject.toml"
          - dir_exists: ".git"
        on_fail:
          action: goto_stage
          target: "stage_0"

  # 阶段 0: 项目初始化
  - id: stage_0
    name: "项目初始化"
    type: conditional
    condition: "project_dir_exists == false"
    skip_if: "项目目录已存在"
    steps:
      - id: ask_init_method
        name: "询问初始化方式"
        type: interactive
        prompt: "请选择项目初始化方式"
        options:
          - id: scaffold
            label: "使用框架脚手架"
            examples:
              - "Next.js: npx create-next-app@latest"
              - "Nuxt: npx nuxi@latest init"
              - "Vite: npm create vite@latest"
          - id: empty_dir
            label: "创建空项目目录"
            commands:
              - "mkdir <project_name>"
              - "cd <project_name>"
              - "git init"
          - id: existing
            label: "已有项目目录"
            action: "切换到项目根目录后继续"
          - id: skip
            label: "跳过初始化"
            action: "终止安装流程"
      - id: verify_project
        name: "验证项目目录"
        checks:
          - condition: "至少一个项目标志存在"
          - command: "pwd && ls -la"

  # 阶段 1: 确认项目状态
  - id: stage_1
    name: "确认项目状态"
    type: required
    steps:
      - id: ask_project_type
        name: "新项目/老项目？"
        type: interactive
        prompt: "请选择项目状态"
        options:
          - id: new_project
            label: "从零创建新项目"
            next_stage: "stage_2"
          - id: existing_project
            label: "已有项目，引入 Harness"
            next_stage: "stage_2"
      - id: ask_tech_type
        name: "项目类型"
        type: interactive
        condition: "new_project_selected"
        prompt: "请选择项目类型"
        options:
          - id: web_frontend
            label: "Web 前端项目"
          - id: client_app
            label: "客户端项目"
          - id: server
            label: "服务端项目"
          - id: fullstack
            label: "全栈项目"

  # 阶段 2: 收集项目信息
  - id: stage_2
    name: "收集项目信息"
    type: required
    description: "配置变量的主要数据来源"
    steps:
      - id: collect_info
        name: "收集基本信息"
        type: interactive
        questions:
          - id: project_name
            label: "项目名称"
            required: true
          - id: framework
            label: "框架"
            type: "multi_select"
            options: ["React", "Vue", "Angular", "Next.js", "Nuxt", "Svelte"]
          - id: package_manager
            label: "包管理器"
            type: "select"
            options: ["pnpm", "yarn", "npm"]
          - id: test_framework
            label: "测试框架"
            type: "select"
            options: ["vitest", "jest", "pytest", "go test", "cargo test"]
        save_to: "memory.variables"

  # 阶段 3: 技术栈检测
  - id: stage_3
    name: "技术栈检测"
    type: branch
    branches:
      - condition: "new_project"
        action: "use_user_input"
        description: "使用阶段 2 用户输入"
      - condition: "existing_project"
        action: "auto_detect"
        description: "自动检测技术栈"
        reference: "./install-reference/tech-detection.md"
    steps:
      - id: verify_detection
        name: "确认检测结果"
        type: interactive
        prompt: "技术栈检测结果"
        show: "detection_report"
        options:
          - id: confirm
            label: "确认无误"
          - id: modify
            label: "修改配置"

  # 阶段 4: AI 配置目录选择
  - id: stage_4
    name: "AI 配置目录选择"
    type: required
    steps:
      - id: scan_config_dirs
        name: "扫描已存在的 AI 配置"
        detect:
          - dir: ".opencode"
            marker: "opencode.json"
          - dir: ".claude"
            marker: "settings.json"
          - dir: ".cursor"
            marker: "rules/"
          - dir: ".github/copilot"
            marker: "instructions.md"
        
      - id: stop_point_1
        name: "停止点 1"
        type: mandatory_stop
        prompt: "选择目标配置目录"
        must_display:
          - "检测结果"
          - "覆盖警告"
        options:
          - id: use_detected
            label: "使用检测到的目录"
          - id: create_new
            label: "创建新目录"
          - id: cancel
            label: "取消安装"
        on_select:
          - use_detected: "记录目标目录，继续"
          - create_new: "输入新目录名，继续"
          - cancel: "终止流程"
        reference: "./install-reference/checklist.md#停止点-1ai-配置目录选择"

      - id: detect_current_ai
        name: "检测当前运行的 AI"
        detect:
          - env: "OPENCODE_SESSION_ID"
            result: "OpenCode"
          - env: "CLAUDE_CODE_VERSION"
            result: "Claude Code"
        
      - id: detect_ai_docs
        name: "检测已存在的 AI 文档"
        detect_files:
          - "AGENTS.md"
          - "CLAUDE.md"
          - "IFLOW.md"
          - "CURSOR_RULES.md"
          - ".cursorrules"
          - ".github/copilot-instructions.md"
        
      - id: stop_point_2
        name: "停止点 2"
        type: mandatory_stop
        condition: "ai_docs_detected"
        prompt: "是否整合已有 AI 文档？"
        must_display:
          - "检测到的文件列表"
          - "信息提取预览"
        options:
          - id: integrate
            label: "整合信息到新配置"
            action: "暂存非技术类信息"
          - id: no_integrate
            label: "不整合，使用默认模板"
            action: "丢弃内容，继续"
          - id: cancel
            label: "取消安装"
        reference: "./install-reference/checklist.md#停止点-2已有-ai-文档整合"

  # 阶段 5: 执行安装
  - id: stage_5
    name: "执行安装"
    type: required
    steps:
      - id: run_openspec_init
        name: "执行 openspec init"
        command: "openspec init"
        creates:
          - "openspec/config.yaml"
          - "openspec/schemas/"
          - "{{AI_CONFIG_DIR}}/commands/"
          - "{{AI_CONFIG_DIR}}/skills/"
        
      - id: extract_info
        name: "信息提取（老项目）"
        condition: "existing_project AND integrate_selected"
        reference: "./install-reference/variables.md"
        
      - id: stop_point_3
        name: "停止点 3"
        type: mandatory_stop
        prompt: "文件覆盖确认"
        must_display:
          - "即将覆盖的文件列表"
          - "不可恢复警告"
        options:
          - id: confirm
            label: "确认继续"
          - id: backup_continue
            label: "备份后继续"
            action: "创建备份到 .backup/"
          - id: cancel
            label: "取消安装"
        reference: "./install-reference/checklist.md#停止点-3文件覆盖确认"
        
      - id: copy_templates
        name: "复制模板文件"
        source: "${OPENSPEC_HARNESS_ROOT}/.template/"
        targets:
          - src: "openspec/config.yaml"
            dest: "openspec/config.yaml"
          - src: "openspec/schemas/*"
            dest: "openspec/schemas/"
          - src: "AGENTS.md"
            dest: "AGENTS.md"
          - src: "custom/commands/*"
            dest: "{{AI_CONFIG_DIR}}/commands/"
          - src: "custom/skills/*"
            dest: "{{AI_CONFIG_DIR}}/skills/"
        
      - id: clean_old_dirs
        name: "清理旧版兼容性目录"
        detect_dir: "{{AI_CONFIG_DIR}}/command"
        action: "删除错误命名的 command/ 目录（单数）"
        
      - id: fill_variables
        name: "填充技术栈变量"
        reference: "./install-reference/variables.md"
        verify_command: "grep -E '\\{\\{[A-Z_]+\\}\\}' openspec/config.yaml AGENTS.md"
        expected_output: "无输出"
        
      - id: integrate_info
        name: "整合非技术类信息"
        condition: "integrate_selected"
        action: "合并编码规范、AI角色等到 AGENTS.md"
        
      - id: ci_config
        name: "CI/CD 配置生成"
        type: interactive
        condition: "ask_user"
        prompt: "是否生成 CI/CD 配置？"
        options:
          - id: github_actions
            label: "GitHub Actions"
            reference: "./install-reference/ci-templates.md#github-actions"
          - id: gitlab_ci
            label: "GitLab CI"
            reference: "./install-reference/ci-templates.md#gitlab-ci"
          - id: other
            label: "其他平台"
            reference: "./install-reference/ci-templates.md#其他-cicd-平台"
          - id: skip
            label: "跳过"
            action: "阶段 6 改为 Manual 模式"

  # 阶段 6: 完成验证
  - id: stage_6
    name: "完成验证"
    type: required
    steps:
      - id: update_agents_md
        name: "更新 AGENTS.md 触发方式"
        condition: "ci_skipped"
        action: "将 Validate 和 Archive 改为 Manual"
        
      - id: verify_installation
        name: "验证安装"
        checks:
          - file_exists: "openspec/config.yaml"
          - dir_exists: "openspec/schemas/"
          - file_exists: "AGENTS.md"
          - dir_exists: "{{AI_CONFIG_DIR}}/commands/"
          - files_count: "{{AI_CONFIG_DIR}}/commands/*.md == 6"
          - dir_exists: "{{AI_CONFIG_DIR}}/skills/"
          - dirs_count: "{{AI_CONFIG_DIR}}/skills/ == 6"
          - not_exists: "{{AI_CONFIG_DIR}}/command/"
        
      - id: show_summary
        name: "显示完成摘要"
        type: output
        template: |
          🎉 OpenSpec Harness 环境搭建完成！
          
          配置摘要：
          ├─ openspec/config.yaml         ✅ 已配置
          ├─ openspec/schemas/            ✅ 已创建
          ├─ AGENTS.md                    ✅ 已配置
          ├─ commands/                    ✅ 6 个命令
          └─ skills/                      ✅ 6 个技能
          
          下一步：
          1. 查看 openspec/config.yaml 确认配置
          2. 阅读 AGENTS.md 了解 AI 助手的工作方式
          3. 创建第一个变更：/opsx-propose <name>

# 错误处理
error_handling:
  reference: "./install-reference/error-recovery.md"
  retryable_stages:
    - stage_0
    - stage_1
    - stage_5
  fatal_errors:
    - id: cli_not_installed
      message: "OpenSpec CLI 未安装"
      recovery: "执行安装或取消流程"
    - id: project_dir_not_found
      message: "项目目录不存在"
      recovery: "执行阶段 0 创建项目"
    - id: user_cancelled
      message: "用户取消安装"
      recovery: "流程终止，可在任何时候重新运行"

# 参考文档
references:
  variables: "./install-reference/variables.md"
  tech_detection: "./install-reference/tech-detection.md"
  ci_templates: "./install-reference/ci-templates.md"
  checklist: "./install-reference/checklist.md"
  error_recovery: "./install-reference/error-recovery.md"