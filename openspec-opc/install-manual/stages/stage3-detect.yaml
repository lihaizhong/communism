version: "1.0"
schema_version: "2.0"
stage: "stage3"
name: "技术栈检测"
description: "补全或确认技术栈变量，解决用户输入、自动检测和安装要求之间的差异。"
task_file: "harness-install-tasks.md"
inputs:
  - PROJECT_TYPE
  - TECH_CATEGORY
  - PROJECT_NAME
  - PROJECT_DESCRIPTION
  - LANGUAGE
  - PACKAGE_MANAGER
outputs:
  - LANGUAGE
  - PACKAGE_MANAGER
  - RUNTIME
  - PRIMARY_FRAMEWORK
  - INSTALL_LANE_ID
  - INSTALL_LANE_PROFILE
  - PROFILE_SMOKE_STATUS
  - PROFILE_SMOKE_COMMAND
  - PROFILE_SMOKE_SUMMARY
  - EXECUTION_PATH
  - TEST_FRAMEWORK
  - TEST_INSTALL_CMD
  - TEST_STATUS
  - TEST_BLOCKER_REASON
  - SRC_DIR
  - TEST_DIR
  - INSTALL_COMMAND
  - DEV_COMMAND
  - BUILD_COMMAND
  - TEST_COMMAND
  - TEST_UNIT_COMMAND
  - LINT_COMMAND
  - TYPE_CHECK_COMMAND
  - FORMAT_COMMAND
fallback:
  on_detection_conflict: "展示冲突并请求用户确认"
  on_missing_test_framework: "允许记录 pending，但必须写入阻塞原因"
variable_conventions:
  case: "UPPER_SNAKE_CASE for task variables"
  mapping_rule: "auto-detected values override guesses, but explicit user confirmation overrides both"
contracts:
  lane_registry: "openspec-opc/install-manual/lanes/registry.json"
  lane_runtime: "openspec-opc/install-manual/lane-registry.mjs"
  profile_smoke_contract: "openspec-opc/install-manual/profile-smoke-contract.mjs"
  stop_point_contract: "openspec-opc/install-manual/stop-points.mjs"

branches:
  new_project:
    action: "confirm_and_complete_user_input"
    prompt: |
      确认你的技术栈配置：[展示阶段 2 收集的信息]

      检查以下关键变量是否完整：
      - PROJECT_NAME
      - LANGUAGE
      - PACKAGE_MANAGER（如适用）
      - TEST_FRAMEWORK
      - 关键命令（TEST / LINT / TYPE_CHECK，如适用）
    options:
      - id: confirm
        label: "确认无误"
        action: "如关键变量仍有缺失，继续补问并写入 harness-install-tasks.md"
      - id: modify
        label: "修改配置"
        action: "回到阶段 2 重新收集"

  existing_project:
    action: "auto_detect"
    detect_steps:
      - id: detect_lane
        method: "根据 lane registry 判断是否进入 Node/TS 新 lane，未命中则标记 legacy_fallback"
      - id: resolve_profile
        method: "若命中 Node/TS lane，则解析 app/service/library；多重命中时进入共享 stop-point，而不是静默猜测"
      - id: detect_framework
        method: "检查依赖声明文件"
      - id: detect_package_manager
        method: "检查 lock 文件"
      - id: detect_test_framework
        method: "检查依赖中的测试框架"
      - id: detect_typescript
        method: "检查 tsconfig.json"
      - id: detect_runtime
        method: "检查 engines 或语言版本文件"
    report_template: |
      🔍 技术栈检测报告
      ├─ 安装路径: {{EXECUTION_PATH}}
      ├─ Lane: {{INSTALL_LANE_ID}}
      ├─ Profile: {{INSTALL_LANE_PROFILE}}
      ├─ Profile Smoke 状态: {{PROFILE_SMOKE_STATUS}}
      ├─ Profile Smoke 命令: {{PROFILE_SMOKE_COMMAND}}
      ├─ 项目类型: {{TECH_CATEGORY}}
      ├─ 框架: {{PRIMARY_FRAMEWORK}}
      ├─ 语言: {{LANGUAGE}}
      ├─ 包管理器: {{PACKAGE_MANAGER}}
      ├─ 测试框架: {{TEST_FRAMEWORK}}
      └─ 运行时: {{RUNTIME}}

test_framework_missing:
  condition: "TEST_FRAMEWORK == '未检测到'"
  mandatory: false
  note: "推荐补齐测试框架。本阶段记录选择，实际安装在阶段 5 执行；若暂不安装，必须记录 pending 状态。"
  prompt: |
    ⚠️ 未检测到测试框架
    OpenSpec OPC 的 Validate 和 Archive 步骤依赖测试来验证变更质量。
    建议安装测试框架；若当前项目暂不接入测试，也可继续，但必须记录为 pending。

    请选择测试框架：
    [1] 安装推荐的测试框架（推荐）
    [2] 自行选择测试框架
    [3] 暂不安装，记录为 pending
  options:
    - id: recommended
      label: "1 - 安装推荐的测试框架"
      action: "根据 TECH_CATEGORY 查找推荐框架，写入 harness-install-tasks.md 的 TEST_FRAMEWORK、TEST_INSTALL_CMD、TEST_STATUS = ready"
    - id: custom
      label: "2 - 自行选择测试框架"
      action: "提示用户输入框架名称，写入 harness-install-tasks.md 的 TEST_FRAMEWORK、TEST_STATUS = ready"
    - id: pending
      label: "3 - 暂不安装"
      action: "写入 TEST_FRAMEWORK = pending、TEST_INSTALL_CMD = pending、TEST_STATUS = pending、TEST_BLOCKER_REASON"
  on_cancel:
    action: "终止流程"

test_framework_recommendations:
  "Next.js / React": { framework: "Vitest", command: "npm install -D vitest @testing-library/react" }
  "Vue": { framework: "Vitest", command: "npm install -D vitest @vue/test-utils" }
  "Node.js": { framework: "Vitest", command: "npm install -D vitest" }
  "Go": { framework: "go test", command: "内置" }
  "Python": { framework: "pytest", command: "pip install pytest" }
  "Rust": { framework: "cargo test", command: "内置" }
  "Java": { framework: "JUnit", command: "通过 Maven/Gradle 添加" }

on_complete:
  action: "将所有检测结果映射并写入 harness-install-tasks.md 配置变量表；统一输出 INSTALL_LANE_ID、INSTALL_LANE_PROFILE、PRIMARY_FRAMEWORK、SRC_DIR、TEST_DIR 和项目命令变量。若命中 Node/TS lane，则还必须通过 profile_smoke_contract 预先写入 PROFILE_SMOKE_STATUS、PROFILE_SMOKE_COMMAND、PROFILE_SMOKE_SUMMARY；library 必须显式写入 not_applicable，app/service 若已检测到 smoke 命令则写 ready 风格的规划值，未检测到则写 missing 与缺失原因。如 profile 命中冲突，必须进入共享 stop-point，使用 recommended/custom/abort 动作标签"
  next: "stage4"
