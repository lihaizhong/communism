version: "1.0"
schema_version: "2.0"
stage: "stage6"
name: "完成验证"
description: "校验最终安装结果，并向用户展示完成摘要与未完成项。"
task_file: "harness-install-tasks.md"
inputs:
  - AI_TOOL_NAME
  - AI_CONFIG_DIR
  - CI_TYPE
  - CI_CONFIG_PATH
  - GENERATE_PRE_COMMIT
  - TEST_STATUS
  - TEST_BLOCKER_REASON
  - INSTALL_LANE_ID
  - INSTALL_LANE_PROFILE
  - EXECUTION_PATH
  - INSTALL_EXECUTION_MODE
  - TEMPLATE_LOCK_PATH
  - TEMPLATE_UPGRADE_PLAN_PATH
  - PROFILE_SMOKE_STATUS
  - PROFILE_SMOKE_COMMAND
  - PROFILE_SMOKE_SUMMARY
  - TERMINAL_RESULT_CARD_PATH
  - CONFORMANCE_REPORT_PATH
  - CONFORMANCE_JSON_PATH
outputs:
  - INSTALL_RESULT
fallback:
  on_verification_failure: "回写失败项、占位残留与空壳文件信息，并提示用户修复后重试"
variable_conventions:
  case: "UPPER_SNAKE_CASE for task variables"
  write_scope: "Verification and summary only"
contracts:
  canonical_result: "openspec-opc/install-manual/conformance-contract.mjs"
  profile_smoke_contract: "openspec-opc/install-manual/profile-smoke-contract.mjs"
  render_contract: "openspec-opc/install-manual/render-contract.mjs"

steps:
  - id: final_check
    name: "最终验证清单与防伪完成检查"
    checks:
      - file_exists: "openspec/config.yaml"
        desc: "配置文件存在且格式正确"
      - dir_has_content: "openspec/schemas/"
        desc: "包含 spec-driven、bugfix、spike"
      - file_exists: "AGENTS.md"
        desc: "AI 行为指南存在"
      - if: "INSTALL_EXECUTION_MODE == template_upgrade"
        file_exists: "{{TEMPLATE_LOCK_PATH}}"
        desc: "template upgrade lock 文件存在"
      - if: "INSTALL_EXECUTION_MODE == template_upgrade"
        file_exists: "{{TEMPLATE_UPGRADE_PLAN_PATH}}"
        desc: "upgrade plan artifact 已写出"
      - files_count: "{{AI_CONFIG_DIR}}/commands/*.md == 6"
        desc: "6 个命令文件"
      - dirs_count: "{{AI_CONFIG_DIR}}/skills/"
        desc: "6 个技能目录"
      - not_exists: "{{AI_CONFIG_DIR}}/../command/"
        desc: "不存在旧的单数目录"
      - if: "AI_TOOL_NAME == opencode"
        file_exists: ".opencode/opencode.json"
        desc: "OpenCode 配置文件存在"
      - file_exists: "{{TERMINAL_RESULT_CARD_PATH}}"
        desc: "terminal result card 已生成"
      - if: "INSTALL_LANE_ID == node-ts"
        file_exists: "{{CONFORMANCE_REPORT_PATH}}"
        desc: "human-readable conformance report 已生成"
      - if: "INSTALL_LANE_ID == node-ts"
        file_exists: "{{CONFORMANCE_JSON_PATH}}"
        desc: "machine JSON conformance bundle 已生成"
      - if: "INSTALL_LANE_ID == node-ts"
        action: "在完成摘要中展示 profile smoke 结果，library 必须展示 not_applicable，app/service 必须展示实际 smoke 命令与摘要"
        desc: "profile smoke 已进入 conformance artifact"
      - file_exists: "{{CI_CONFIG_PATH}}"
        desc: "CI/CD 配置存在（不可跳过）"
      - if: "TEST_STATUS == pending"
        action: "在完成摘要中展示测试框架待处理"
        desc: "测试框架暂未安装，但已记录后续动作"
      - if: "GENERATE_PRE_COMMIT == yes"
        one_of:
          - file_executable: ".git/hooks/pre-commit"
          - file_executable: ".husky/pre-commit"
        desc: "pre-commit hook 已安装且可执行（支持 .git/hooks 或 .husky）"
    verify:
      command: |
        ! rg -n -i 'TODO|TBD|placeholder|stub|mock|待补充|未实现' \
          openspec/config.yaml \
          AGENTS.md \
          {{AI_CONFIG_DIR}}/commands \
          {{AI_CONFIG_DIR}}/skills && \
        test -s openspec/config.yaml && \
        test -s AGENTS.md && \
        test -s "{{CI_CONFIG_PATH}}" && \
        ! grep -E '\\{\\{[A-Z_]+\\}\\}' "{{CI_CONFIG_PATH}}" && \
        { [ "{{GENERATE_PRE_COMMIT}}" != "yes" ] || { \
          { [ ! -f .git/hooks/pre-commit ] || { test -s .git/hooks/pre-commit && ! grep -E '\\{\\{[A-Z_]+\\}\\}' .git/hooks/pre-commit; }; } && \
          { [ ! -f .husky/pre-commit ] || { test -s .husky/pre-commit && ! grep -E '\\{\\{[A-Z_]+\\}\\}' .husky/pre-commit; }; }; \
        }; } && \
        [ "$(find {{AI_CONFIG_DIR}}/commands -type f -name '*.md' | wc -l | tr -d ' ')" = "6" ] && \
        [ "$(find {{AI_CONFIG_DIR}}/commands -type f -name '*.md' -size +0c | wc -l | tr -d ' ')" = "6" ] && \
        [ "$(find {{AI_CONFIG_DIR}}/skills -mindepth 1 -maxdepth 1 -type d | wc -l | tr -d ' ')" = "6" ] && \
        [ "$(find {{AI_CONFIG_DIR}}/skills -mindepth 1 -maxdepth 1 -type d -exec test -s '{}/SKILL.md' ';' -print | wc -l | tr -d ' ')" = "6" ] && \
        test -s "{{TERMINAL_RESULT_CARD_PATH}}" && \
        ! grep -E '\\{\\{[A-Z_]+\\}\\}' "{{TERMINAL_RESULT_CARD_PATH}}" && \
        { [ "{{AI_TOOL_NAME}}" != "opencode" ] || { \
          test -s .opencode/opencode.json && \
          rg -q '"\\$schema"\\s*:\\s*"https://opencode.ai/config.json"' .opencode/opencode.json && \
          rg -q '"plugin"\\s*:' .opencode/opencode.json && \
          rg -q '@openspec-opc/opencode-plugin' .opencode/opencode.json; \
        }; } && \
        { [ "{{INSTALL_LANE_ID}}" != "node-ts" ] || { \
          test -n "{{PROFILE_SMOKE_STATUS}}" && \
          { [ "{{INSTALL_LANE_PROFILE}}" = "library" ] || test -n "{{PROFILE_SMOKE_COMMAND}}"; } && \
          test -s "{{TERMINAL_RESULT_CARD_PATH}}" && \
          test -s "{{CONFORMANCE_REPORT_PATH}}" && \
          test -s "{{CONFORMANCE_JSON_PATH}}" && \
          ! grep -E '\\{\\{[A-Z_]+\\}\\}' "{{TERMINAL_RESULT_CARD_PATH}}" "{{CONFORMANCE_REPORT_PATH}}" "{{CONFORMANCE_JSON_PATH}}" && \
          rg -q 'profile smoke:' "{{TERMINAL_RESULT_CARD_PATH}}" && \
          rg -q '## Profile Smoke' "{{CONFORMANCE_REPORT_PATH}}" && \
          rg -q '"profileSmoke"' "{{CONFORMANCE_JSON_PATH}}"; \
        }; }
      expected: "退出码为 0，且不存在 TODO/占位/空文件/缺失 SKILL.md 的伪完成情况；若目标是 OpenCode，则 .opencode/opencode.json 至少包含官方 schema、plugin 字段和 @openspec-opc/opencode-plugin；若命中 Node/TS lane，则必须已经写出 terminal result card、human report、machine JSON 三类结果产物，并带有 profile smoke 字段"

  - id: show_summary
    name: "显示 render contract 生成的 terminal result card"
    template: |
      source of truth:
      - always render exactly the contents of {{TERMINAL_RESULT_CARD_PATH}}
      - do not reconstruct overall result, execution path, gate lines, profile smoke lines, written changes, next actions, or artifact paths inside stage6
      - if {{TERMINAL_RESULT_CARD_PATH}} is missing, treat verification as failed
      artifact bundle:
      - terminal result card: {{TERMINAL_RESULT_CARD_PATH}}
      - if EXECUTION_PATH == new_lane, also surface {{CONFORMANCE_REPORT_PATH}} and {{CONFORMANCE_JSON_PATH}}
      - if EXECUTION_PATH == legacy_fallback, the terminal result card remains the primary output and no new lane conformance bundle is required
      note: stage6 only displays the render-contract artifact; canonical_result.gates, canonical_result.profileSmoke, and execution path formatting must come from render_contract, not handwritten template lines, including legacy_fallback

on_complete:
  action: "仅在最终验证通过时标记 harness-install-tasks.md 任务完成并保留 pending 项说明；若发现伪完成痕迹，则将 INSTALL_RESULT 记录为 failed，并回写具体失败文件与原因"
