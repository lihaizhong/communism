# OpenSpec Configuration

schema: spec-driven

schemas:
  spec-driven:
    path: openspec/schemas/spec-driven
    description: Standard spec-driven development
  bugfix:
    path: openspec/schemas/bugfix
    description: Streamlined bug fix workflow
  spike:
    path: openspec/schemas/spike
    description: Technical research and investigation

context:
  project:
    name: "{{PROJECT_NAME}}"
    description: "{{PROJECT_DESCRIPTION}}"
    type: "{{PROJECT_TYPE}}"
    language: "{{LANGUAGE}}"
    runtime: "{{RUNTIME}}"

  stack:
    framework: "{{PRIMARY_FRAMEWORK}}"
    test_framework: "{{TEST_FRAMEWORK}}"
    build_tool: "{{BUILD_TOOL}}"

  paths:
    source: "{{SRC_DIR}}"
    tests: "{{TEST_DIR}}"
    ai_config: "{{AI_CONFIG_DIR}}"

  commands:
    install: "{{INSTALL_COMMAND}}"
    dev: "{{DEV_COMMAND}}"
    build: "{{BUILD_COMMAND}}"
    test: "{{TEST_COMMAND}}"
    test_unit: "{{TEST_UNIT_COMMAND}}"
    lint: "{{LINT_COMMAND}}"
    type_check: "{{TYPE_CHECK_COMMAND}}"
    format: "{{FORMAT_COMMAND}}"

  conventions:
    - Keep changes aligned with approved OpenSpec artifacts
    - Prefer small, reversible changes
    - Use English identifiers
    - Follow repository-local conventions before introducing new ones

  modules:
    app:
      purpose: Primary application or service code
      path: "{{SRC_DIR}}"
    tests:
      purpose: Automated validation and regression coverage
      path: "{{TEST_DIR}}"
    openspec:
      purpose: Change management artifacts and workflow definitions
      path: "openspec/"
    ai_config:
      purpose: AI assistant commands, skills, and prompts
      path: "{{AI_CONFIG_DIR}}"
