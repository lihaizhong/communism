# OpenSpec Archive Workflow
# 在 release 发布时自动归档已完成的变更

name: OpenSpec Archive

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      change_id:
        description: 'Specific change ID to archive (leave empty to archive all completed)'
        required: false
        type: string

jobs:
  archive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup project runtime
        run: |
          echo "Configure the runtime for your project here if needed."
          echo "Examples: Node, Python, Go, Java, Rust."

      - name: Install project dependencies
        run: |
          if [ -n "{{INSTALL_COMMAND}}" ]; then
            sh -c "{{INSTALL_COMMAND}}"
          fi

      - name: Setup OpenSpec CLI
        run: npm install -g @fission-ai/openspec@latest

      - name: Verify OpenSpec installation
        run: openspec --version

      - name: Run validation
        run: |
          if [ -n "{{LINT_COMMAND}}" ]; then sh -c "{{LINT_COMMAND}}"; fi
          if [ -n "{{TEST_COMMAND}}" ]; then sh -c "{{TEST_COMMAND}}"; fi
          if [ -n "{{TYPE_CHECK_COMMAND}}" ]; then sh -c "{{TYPE_CHECK_COMMAND}}"; fi

      - name: Archive changes
        run: |
          if [ -n "${{ github.event.inputs.change_id }}" ]; then
            openspec archive ${{ github.event.inputs.change_id }}
          else
            openspec archive --all-completed
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add openspec/changes/archive/ openspec/bugs/archive/
          git diff --staged --quiet || git commit -m "chore: archive completed changes [skip ci]"
          git push
