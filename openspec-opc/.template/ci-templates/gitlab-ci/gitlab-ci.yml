# OpenSpec Archive Pipeline for GitLab
# 在 tag 发布时自动归档已完成的变更
# 根据项目实际情况修改变量和命令

stages:
  - validate
  - archive

variables:
  GIT_DEPTH: 10
  # 可选：指定特定变更 ID
  # OPENSPEC_CHANGE_ID: ""

# 验证阶段 - 在归档前运行测试和 lint
openspec:validate:
  stage: validate
  script:
    - if [ -n "{{INSTALL_COMMAND}}" ]; then sh -c "{{INSTALL_COMMAND}}"; fi
    - npm install -g @fission-ai/openspec@latest
    - openspec --version
    - if [ -n "{{LINT_COMMAND}}" ]; then sh -c "{{LINT_COMMAND}}"; fi
    - if [ -n "{{TEST_COMMAND}}" ]; then sh -c "{{TEST_COMMAND}}"; fi
    - if [ -n "{{TYPE_CHECK_COMMAND}}" ]; then sh -c "{{TYPE_CHECK_COMMAND}}"; fi
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"
  tags:
    - docker

# 归档阶段 - 归档已完成的变更
openspec:archive:
  stage: archive
  script:
    - if [ -n "{{INSTALL_COMMAND}}" ]; then sh -c "{{INSTALL_COMMAND}}"; fi
    - npm install -g @fission-ai/openspec@latest
    - openspec --version
    # 归档变更
    - |
      if [ -n "$OPENSPEC_CHANGE_ID" ]; then
        openspec archive "$OPENSPEC_CHANGE_ID"
      else
        openspec archive --all-completed
      fi
    # 提交归档结果
    - git config user.email "gitlab-ci@example.com"
    - git config user.name "GitLab CI"
    - git add openspec/changes/archive/ openspec/bugs/archive/
    - git diff --staged --quiet || git commit -m "chore: archive completed changes [skip ci]"
    - git push https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git HEAD:${CI_COMMIT_REF_NAME}
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
      allow_failure: true
  needs:
    - job: openspec:validate
      optional: false
  tags:
    - docker
